name: Despliegue Profesional con Docker

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v3

      - name: Iniciar sesión en GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # Este secreto ya existe automáticamente en GitHub

      - name: Construir y subir imagen a GHCR
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # Cambia "TU_USUARIO" por tu nombre de usuario de GitHub en minúsculas
          tags: ghcr.io/brayanb312/mi-sitio-react:latest 

  deploy:
    needs: build-and-push # Espera a que la imagen se construya
    runs-on: ubuntu-latest
    steps:
      - name: Desplegar en la VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # 1. Descarga la imagen terminada (Cambia "TU_USUARIO")
            docker pull ghcr.io/brayanb312/mi-sitio-react:latest
            
            # 2. Detiene y borra la versión vieja
            docker stop sitio-produccion || true
            docker rm sitio-produccion || true
            
            # 3. Arranca la nueva versión
            docker run -d -p 80:80 --name sitio-produccion ghcr.io/brayanb312/mi-sitio-react:latest