name: Despliegue Profesional con Docker

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Descargar código
        uses: actions/checkout@v4 # Actualizado a v4

      - name: Iniciar sesión en GitHub Container Registry
        uses: docker/login-action@v3 # Actualizado a v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Construir y subir imagen a GHCR
        uses: docker/build-push-action@v5 # Actualizado a v5
        with:
          context: .
          push: true
          tags: ghcr.io/brayanb312/mi-sitio-react:latest 

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Desplegar en la VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # 1. Descarga la imagen
            docker pull ghcr.io/brayanb312/mi-sitio-react:latest
            
            # 2. Detiene y borra el anterior
            docker stop sitio-produccion || true
            docker rm sitio-produccion || true
            
            # 3. Arranca con puertos 80, 443 y los certificados (CAMBIA TU_DOMINIO_REAL)
            docker run -d \
              -p 80:80 -p 443:443 \
              --name sitio-produccion \
              -v /etc/letsencrypt/live/TU_DOMINIO_REAL/fullchain.pem:/etc/nginx/certs/fullchain.pem:ro \
              -v /etc/letsencrypt/live/TU_DOMINIO_REAL/privkey.pem:/etc/nginx/certs/privkey.pem:ro \
              ghcr.io/brayanb312/mi-sitio-react:latest